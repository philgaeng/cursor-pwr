<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusLink - Consent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="consent">
    <main class="mobile-shell">
      <header class="app-header">
        <p class="eyebrow">NexusLink</p>
        <h1>Privacy and Consent</h1>
        <p class="subtitle">Consent-first networking with optional 24h deletion.</p>
      </header>
      <section class="glass-card">
        <div class="step-pill">Step 4 of 6</div>
        <form id="consent-form" class="stack">
          <label class="checkbox-row">
            <input id="privacy-consent" type="checkbox" required />
            I agree to the privacy and attendee conduct policy.
          </label>
          <label class="checkbox-row">
            <input id="auto-delete" type="checkbox" checked />
            Delete my data 24h after event.
          </label>
          <button type="submit">Complete Onboarding</button>
        </form>
      </section>
    </main>
    <footer class="status-bar">
      <span id="app-status">You must accept consent to continue.</span>
    </footer>
    <script src="./main.js" type="module"></script>
  </body>
</html>
