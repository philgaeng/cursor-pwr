<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusLink - Icebreakers</title>
    <link rel="stylesheet" href="/styles.css" />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("nexuslink-web-state-v2");
          var s = raw ? JSON.parse(raw) : {};
          if (!s || !s.auth) {
            window.location.replace("/index.html");
            return;
          }
          if (!s.profile) {
            window.location.replace("/profile.html");
            return;
          }
        } catch (_e) {
          window.location.replace("/index.html");
        }
      })();
    </script>
  </head>
  <body data-page="questions">
    <main class="mobile-shell">
      <header class="app-header">
        <p class="eyebrow">NexusLink</p>
        <h1>Icebreaker Questions</h1>
        <p class="subtitle">Complete your assigned routes to power high-quality matching.</p>
      </header>
      <section class="glass-card icebreaker-card">
        <div class="step-pill" id="icebreaker-step-pill">Loading…</div>
        <h2 class="icebreaker-route-title" id="icebreaker-route-title"></h2>
        <p class="icebreaker-prompt" id="icebreaker-prompt"></p>
        <div id="icebreaker-stage" class="icebreaker-stage" aria-live="polite">
          <p class="icebreaker-hint">Loading route choices…</p>
        </div>
        <div class="icebreaker-nav">
          <button type="button" class="ghost-btn" id="icebreaker-back" hidden>Back</button>
        </div>
      </section>
    </main>
    <footer class="status-bar">
      <span id="app-status">Complete all assigned routes.</span>
    </footer>
    <script src="/main.js" type="module"></script>
  </body>
</html>
