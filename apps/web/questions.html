<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusLink - Icebreakers</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="questions">
    <main class="mobile-shell">
      <header class="app-header">
        <p class="eyebrow">NexusLink</p>
        <h1>Icebreaker Questions</h1>
        <p class="subtitle">Complete your assigned routes to power high-quality matching.</p>
      </header>
      <section class="glass-card">
        <div class="step-pill">Step 3 of 6</div>
        <form id="questionnaire-form" class="stack">
          <div id="question-list" class="question-list"></div>
          <button type="submit">Save Route Answers</button>
        </form>
      </section>
    </main>
    <footer class="status-bar">
      <span id="app-status">Complete all assigned routes.</span>
    </footer>
    <script src="./main.js" type="module"></script>
  </body>
</html>
