<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusLink - Profile</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="profile">
    <main class="mobile-shell">
      <header class="app-header">
        <p class="eyebrow">NexusLink</p>
        <h1>Your Profile</h1>
        <p class="subtitle">Tell people what you offer and what you need.</p>
      </header>
      <section class="glass-card">
        <div class="step-pill">Step 2 of 6</div>
        <p class="flow-hint">01_auth -> 02_details_gathering -> 03_icebreaker_questions -> done</p>
        <form id="profile-form" class="stack">
          <label>Full Name <input id="full-name" required placeholder="Alex Rivera" /></label>
          <label>Role <input id="role" required placeholder="Founder" /></label>
          <label>Company <input id="company" required placeholder="Nexus Labs" /></label>
          <label>Email <input id="email" type="email" required placeholder="alex@company.com" /></label>
          <label>WhatsApp <input id="whatsapp" required placeholder="+65 9123 4567" /></label>
          <div class="tag-section">
            <p class="tag-title">What I Offer (select at least 1)</p>
            <div id="offer-tag-options" class="tag-options" role="group" aria-label="Offer tags"></div>
          </div>
          <div class="tag-section">
            <p class="tag-title">What I am Looking For (select at least 1)</p>
            <div id="seek-tag-options" class="tag-options" role="group" aria-label="Seek tags"></div>
          </div>
          <button type="submit">Save and Continue</button>
        </form>
      </section>
    </main>
    <footer class="status-bar">
      <span id="app-status">Complete your profile details.</span>
    </footer>
    <script src="/main.js" type="module"></script>
  </body>
</html>
