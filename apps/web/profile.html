<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusLink - Profile</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="profile">
    <main class="mobile-shell">
      <header class="app-header">
        <p class="eyebrow">NexusLink</p>
        <h1>Your Profile</h1>
        <p class="subtitle">Tell people what you offer and what you need.</p>
      </header>
      <section class="glass-card">
        <div class="step-pill">Step 2 of 6</div>
        <form id="profile-form" class="stack">
          <label>Full Name <input id="full-name" required placeholder="Alex Rivera" /></label>
          <label>Role <input id="role" required placeholder="Founder" /></label>
          <label>Company <input id="company" required placeholder="Nexus Labs" /></label>
          <label>WhatsApp <input id="whatsapp" required placeholder="+65 9123 4567" /></label>
          <label>
            What I Offer (exactly 3, comma separated)
            <input id="offer-tags" required placeholder="Fundraising, Partnerships, Hiring" />
          </label>
          <label>
            What I am Looking For (exactly 3, comma separated)
            <input id="seek-tags" required placeholder="Investors, AI Engineer, Pilot Clients" />
          </label>
          <button type="submit">Save and Continue</button>
        </form>
      </section>
    </main>
    <footer class="status-bar">
      <span id="app-status">Complete your profile details.</span>
    </footer>
    <script src="./main.js" type="module"></script>
  </body>
</html>
