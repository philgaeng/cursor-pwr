<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusLink - Auth</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="auth">
    <main class="mobile-shell">
      <header class="app-header">
        <p class="eyebrow">NexusLink</p>
        <h1>Start Networking Fast</h1>
        <p class="subtitle">Sign in and unlock your AI-powered match flow.</p>
      </header>

      <section class="glass-card">
        <div class="step-pill">Step 1 of 6</div>
        <h2>Auth Entry</h2>
        <p class="helper">Google is default. LinkedIn works in demo mode.</p>
        <form id="auth-form" class="stack">
          <label>
            Sign in Provider
            <select id="provider" required>
              <option value="google">Google</option>
              <option value="linkedin">LinkedIn</option>
            </select>
          </label>
          <label class="checkbox-row">
            <input id="demo-mode" type="checkbox" />
            Enable demo mode fallback
          </label>
          <button type="submit">Continue to Profile</button>
        </form>
      </section>
    </main>

    <footer class="status-bar">
      <span id="app-status">Waiting for auth step.</span>
    </footer>
    <script src="./main.js" type="module"></script>
  </body>
</html>
